<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Tracker — Hasini Kadaru</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #888;
    --accent: #c8b89a;
    --accent2: #8fba9f;
    --accent3: #a0b4c8;
    --danger: #c87a7a;
    --tag-h1b-bg: rgba(143,186,159,0.15);
    --tag-h1b: #8fba9f;
    --tag-passive-bg: rgba(160,180,200,0.15);
    --tag-passive: #a0b4c8;
    --tag-bg: rgba(255,255,255,0.06);
    --tag: #888;
    --radius: 10px;
    --radius-sm: 6px;
  }

  html { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 15px; line-height: 1.6; }

  body { min-height: 100vh; }

  /* Header */
  .header {
    padding: 2rem 2rem 0;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.5rem;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--accent); letter-spacing: -0.01em; }
  .logo span { font-style: italic; color: var(--muted); font-size: 0.9rem; display: block; font-family: 'Outfit', sans-serif; font-weight: 300; margin-top: -2px; }
  .date-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface2); border: 0.5px solid var(--border); padding: 5px 10px; border-radius: var(--radius-sm); }

  /* Tabs */
  .tabs { display: flex; gap: 0; }
  .tab {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    transition: color 0.15s;
    letter-spacing: 0.02em;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main */
  .main { padding: 1.5rem 2rem; max-width: 860px; }

  .section { display: none; }
  .section.active { display: block; }

  /* Section header */
  .sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .sec-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--text); }
  .sec-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* Buttons */
  .btn {
    font-size: 12px; font-weight: 500; padding: 7px 14px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: none; cursor: pointer; color: var(--text);
    transition: background 0.15s, border-color 0.15s;
    font-family: 'Outfit', sans-serif;
  }
  .btn:hover { background: var(--surface2); border-color: var(--border2); }
  .btn-primary { background: var(--accent); color: #0e0e0e; border-color: var(--accent); font-weight: 500; }
  .btn-primary:hover { opacity: 0.88; background: var(--accent); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-ghost { border-color: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--danger); background: none; }
  .btn-refresh { display: flex; align-items: center; gap: 6px; }

  /* Filter pills */
  .filters { display: flex; gap: 6px; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .fpill {
    font-size: 11px; padding: 4px 12px; border: 0.5px solid var(--border);
    border-radius: 20px; background: none; cursor: pointer; color: var(--muted);
    transition: all 0.15s; font-family: 'Outfit', sans-serif;
  }
  .fpill:hover { border-color: var(--border2); color: var(--text); }
  .fpill.active { background: var(--accent); color: #0e0e0e; border-color: var(--accent); font-weight: 500; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .card-desc { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .card-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; align-items: flex-end; }

  /* Tags */
  .tags { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; letter-spacing: 0.02em; }
  .tag-h1b { background: var(--tag-h1b-bg); color: var(--tag-h1b); }
  .tag-passive { background: var(--tag-passive-bg); color: var(--tag-passive); }
  .tag-remote { background: rgba(200,184,154,0.15); color: var(--accent); }
  .tag-onsite { background: rgba(255,255,255,0.06); color: #888; }
  .tag-applied { background: rgba(200,184,154,0.12); color: var(--accent); }
  .tag-heard { background: rgba(200,184,154,0.2); color: #d4a76a; }
  .tag-interviewing { background: rgba(143,186,159,0.15); color: var(--accent2); }
  .tag-rejected { background: rgba(200,120,120,0.12); color: var(--danger); }
  .tag-overdue { background: rgba(200,120,120,0.15); color: var(--danger); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.4rem; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text); font-size: 13px; font-family: 'Outfit', sans-serif; }
  .search-wrap input:focus { outline: none; border-color: var(--border2); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* Sync status */
  .sync { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-left: 10px; }
  .sync.ok { color: var(--accent2); }
  .sync.err { color: var(--danger); }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 1.5rem; width: 92%; max-width: 460px; max-height: 88vh; overflow-y: auto; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.2rem; margin-bottom: 1.2rem; color: var(--text); }
  .form-group { margin-bottom: 12px; }
  .form-group label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text);
    font-size: 13px; font-family: 'Outfit', sans-serif;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--border2); }
  .form-group textarea { height: 72px; resize: vertical; }
  .form-group select option { background: var(--surface2); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.2rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }

  /* Loading / empty */
  .loading { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 13px; font-family: 'DM Mono', monospace; }
  .loading::after { content: ''; display: inline-block; animation: dots 1.2s infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 13px; }

  /* Animations */
  .card { animation: fadein 0.2s ease both; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* Mobile */
  @media (max-width: 600px) {
    .header { padding: 1.2rem 1rem 0; }
    .main { padding: 1.2rem 1rem; }
    .stats { grid-template-columns: repeat(3,1fr); gap: 6px; }
    .stat { padding: 0.75rem 0.8rem; }
    .stat-num { font-size: 1.5rem; }
    .tab { padding: 8px 12px; font-size: 12px; }
    .card-title { font-size: 13px; }
  }

  a { color: inherit; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      Job Radar
      <span>hasinikadaru.com</span>
    </div>
    <div class="date-badge" id="today-date"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('digest',this)">Morning digest</button>
    <button class="tab" onclick="switchTab('applications',this)">Applications</button>
    <button class="tab" onclick="switchTab('outreach',this)">Outreach</button>
    <button class="tab" onclick="switchTab('distill',this)">Distill import</button>
  </div>
</div>

<div class="main">

  <!-- DIGEST -->
  <div id="digest" class="section active">
    <div class="sec-header">
      <div>
        <div class="sec-title">Today's openings</div>
        <div class="sec-sub">CPHC · Revit · H1B-capable · Entry level</div>
      </div>
      <button class="btn btn-primary btn-refresh" onclick="fetchJobs()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.76-4.24L9 6h6V0l-1.35 2.35z" fill="currentColor"/></svg>
        Refresh
      </button>
    </div>
    <div class="filters">
      <button class="fpill active" onclick="filterJobs('all',this)">All</button>
      <button class="fpill" onclick="filterJobs('remote',this)">Remote 🌐</button>
      <button class="fpill" onclick="filterJobs('usonsite',this)">US onsite / hybrid</button>
      <button class="fpill" onclick="filterJobs('h1b',this)">H1B-capable</button>
      <button class="fpill" onclick="filterJobs('passive',this)">Passive house</button>
      <button class="fpill" onclick="filterJobs('archinect',this)">Archinect</button>
      <button class="fpill" onclick="filterJobs('aia',this)">AIA</button>
      <button class="fpill" onclick="filterJobs('dezeen',this)">Dezeen</button>
      <button class="fpill" onclick="filterJobs('archdaily',this)">ArchDaily</button>
      <button class="fpill" onclick="filterJobs('indeed',this)">Indeed</button>
      <button class="fpill" onclick="filterJobs('zip',this)">ZipRecruiter</button>
      <button class="fpill" onclick="filterJobs('simply',this)">SimplyHired</button>
      <button class="fpill" onclick="filterJobs('wwr',this)">WeWorkRemotely</button>
      <button class="fpill" onclick="filterJobs('remoteio',this)">Remote.co</button>
      <button class="fpill" onclick="filterJobs('buildremote',this)">Buildremote</button>
    </div>
    <div id="jobs-list"></div>
  </div>

  <!-- APPLICATIONS -->
  <div id="applications" class="section">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">applied</div></div>
      <div class="stat"><div class="stat-num" id="s-active">—</div><div class="stat-label">active</div></div>
      <div class="stat"><div class="stat-num" id="s-interview">—</div><div class="stat-label">interviewing</div></div>
    </div>
    <div class="sec-header">
      <div style="display:flex;align-items:center;">
        <div class="sec-title">Application log</div>
        <span class="sync" id="app-sync"></span>
      </div>
      <button class="btn btn-primary" onclick="openAppModal()">+ Add</button>
    </div>
    <div class="search-wrap"><input type="text" placeholder="Search firms or roles..." oninput="renderApps(this.value)" /></div>
    <div id="apps-list"></div>
  </div>

  <!-- DISTILL IMPORT -->
  <div id="distill" class="section">
    <div class="sec-header">
      <div>
        <div class="sec-title">Distill import</div>
        <div class="sec-sub">Paste your Distill alert email · AI filters for architecture jobs</div>
      </div>
    </div>
    <div style="margin-bottom:1rem;">
      <textarea id="distill-paste" placeholder="Paste your full Distill alert email here — the AI will extract relevant architecture jobs, filter by entry level / H1B / passive house, and show them for you to log..." style="width:100%;height:160px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;resize:vertical;line-height:1.6;"></textarea>
    </div>
    <button class="btn btn-primary" onclick="runDistillFilter()" id="distill-btn" style="width:100%;padding:10px;font-size:14px;">Analyse with AI</button>
    <div id="distill-results" style="margin-top:1.5rem;"></div>
  </div>

  <!-- OUTREACH -->
  <div id="outreach" class="section">
    <div class="sec-header">
      <div style="display:flex;align-items:center;">
        <div class="sec-title">Outreach log</div>
        <span class="sync" id="out-sync"></span>
      </div>
      <button class="btn btn-primary" onclick="openOutModal()">+ Add contact</button>
    </div>
    <div class="filters">
      <button class="fpill active" onclick="filterOut('all',this)">All</button>
      <button class="fpill" onclick="filterOut('followup',this)">Needs follow-up</button>
      <button class="fpill" onclick="filterOut('linkedin',this)">LinkedIn</button>
      <button class="fpill" onclick="filterOut('email',this)">Email</button>
    </div>
    <div id="out-list"></div>
  </div>

</div>

<!-- APP MODAL -->
<div class="modal-bg" id="app-modal">
  <div class="modal">
    <div class="modal-title" id="app-modal-title">Log application</div>
    <div class="form-group"><label>Firm name</label><input type="text" id="app-firm" placeholder="e.g. ZGF Architects" /></div>
    <div class="form-group"><label>Role title</label><input type="text" id="app-role" placeholder="e.g. Architectural Designer" /></div>
    <div class="form-row">
      <div class="form-group"><label>Date applied</label><input type="date" id="app-date" /></div>
      <div class="form-group"><label>Status</label>
        <select id="app-status">
          <option value="pending">Applied — waiting</option>
          <option value="heard">Heard back</option>
          <option value="interviewing">Interviewing</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Location</label><input type="text" id="app-loc" placeholder="e.g. Brooklyn, NY" /></div>
      <div class="form-group"><label>H1B sponsor?</label>
        <select id="app-h1b"><option value="yes">Yes</option><option value="unknown">Unknown</option><option value="no">No</option></select>
      </div>
    </div>
    <div class="form-group"><label>Job link</label><input type="url" id="app-link" placeholder="https://..." /></div>
    <div class="form-group"><label>Notes</label><textarea id="app-notes" placeholder="Firm culture, contacts, fit notes..."></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('app-modal')">Cancel</button>
      <button class="btn btn-primary" id="app-save-btn" onclick="saveApp()">Save to Sheet</button>
    </div>
  </div>
</div>

<!-- OUTREACH MODAL -->
<div class="modal-bg" id="out-modal">
  <div class="modal">
    <div class="modal-title" id="out-modal-title">Log outreach</div>
    <div class="form-group"><label>Name</label><input type="text" id="out-name" placeholder="e.g. Sarah Kim" /></div>
    <div class="form-group"><label>Firm</label><input type="text" id="out-firm" placeholder="e.g. Snøhetta" /></div>
    <div class="form-row">
      <div class="form-group"><label>Channel</label>
        <select id="out-channel"><option value="linkedin">LinkedIn</option><option value="email">Email</option></select>
      </div>
      <div class="form-group"><label>Date</label><input type="date" id="out-date" /></div>
    </div>
    <div class="form-group"><label>Their role</label><input type="text" id="out-role" placeholder="e.g. Principal, Studio Director" /></div>
    <div class="form-group"><label>Follow-up date</label><input type="date" id="out-followup" /></div>
    <div class="form-group"><label>Notes</label><textarea id="out-notes" placeholder="What you said, any response..."></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('out-modal')">Cancel</button>
      <button class="btn btn-primary" id="out-save-btn" onclick="saveOutreach()">Save to Sheet</button>
    </div>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzvZzoNngadzffQOIjlabzpTvwF0fWMsVLjMfxyerLETW1MgegSM06IjvWb0r6gNS2x/exec';

let jobs = [], apps = [], outreach = [];
let jobFilter = 'all', outFilter = 'all';
let editAppId = null, editOutId = null;

const SOURCES = [
  { id:'archinect',    name:'Archinect',        rss:'https://archinect.com/feed/jobs' },
  { id:'aia',          name:'AIA',              rss:'https://careercenter.aia.org/jobs/rss' },
  { id:'dezeen',       name:'Dezeen',           rss:'https://www.dezeen.com/jobs/feed/' },
  { id:'archdaily',    name:'ArchDaily',        rss:'https://www.archdaily.com/feed/jobs' },
  { id:'indeed',       name:'Indeed',           rss:'https://www.indeed.com/rss?q=architectural+designer+entry+level&l=United+States&sort=date' },
  { id:'indeed2',      name:'Indeed',           rss:'https://www.indeed.com/rss?q=passive+house+architect&l=United+States&sort=date' },
  { id:'indeed3',      name:'Indeed',           rss:'https://www.indeed.com/rss?q=architectural+designer&l=United+States&remotejob=032b3046-06a3-4876-8dfd-474eb5e7ed11&sort=date' },
  { id:'zip',          name:'ZipRecruiter',     rss:'https://www.ziprecruiter.com/jobs-search?search=architectural+designer&location=United+States&date_posted=1&format=rss' },
  { id:'simply',       name:'SimplyHired',      rss:'https://www.simplyhired.com/search?q=architectural+designer+entry+level&l=united+states&sort=date&fjt=rss' },
  { id:'wwr',          name:'WeWorkRemotely',   rss:'https://weworkremotely.com/categories/remote-design-jobs.rss' },
  { id:'remoteio',     name:'Remote.co',        rss:'https://remote.co/feed/' },
  { id:'jobspresso',   name:'Jobspresso',       rss:'https://jobspresso.co/feed/' },
  { id:'buildremote',  name:'Buildremote',      rss:'https://buildremote.co/feed/' },
  { id:'remotearch',   name:'Indeed Remote',    rss:'https://www.indeed.com/rss?q=architect+remote&sort=date' },
];
const ARCH_KW = ['architectural designer','architect','passive house','phius','sustainability','enclosure','building science','revit','entry level','junior'];
const H1B_FIRMS = ['gensler','som','hok','hks','perkins eastman','aecom','jacobs','kpf','snohetta','morphosis','big architects','dattner','labbella','pelli','bjarke','skidmore'];

document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

async function sheetGet(action) {
  const r = await fetch(SHEET_URL + '?action=' + action);
  return r.json();
}
async function sheetPost(action, data, id) {
  let url = SHEET_URL + '?action=' + action;
  if (id !== undefined) url += '&id=' + id;
  if (data) url += '&data=' + encodeURIComponent(JSON.stringify(data));
  const r = await fetch(url);
  return r.json();
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
  if (id==='applications') loadApps();
  if (id==='outreach') loadOutreach();
}

async function fetchJobs() {
  const list = document.getElementById('jobs-list');
  list.innerHTML = '<div class="loading">Fetching from all sources</div>';
  jobs = [];
  const proxy = 'https://api.rss2json.com/v1/api.json?rss_url=';
  await Promise.allSettled(SOURCES.map(async src => {
    try {
      const r = await fetch(proxy + encodeURIComponent(src.rss) + '&count=20');
      const d = await r.json();
      if (d.items) d.items.forEach(item => {
        const text = (item.title+' '+(item.description||'')).toLowerCase();
        const alwaysInclude = src.id==='archinect' || src.id==='aia';
        if (alwaysInclude || ARCH_KW.some(k=>text.includes(k))) {
          const tl = (item.title||'').toLowerCase();
          // deduplicate by link
          if (jobs.find(j=>j.link===item.link)) return;
          const isRemote = text.includes('remote')||text.includes('work from home')||text.includes('wfh')||src.id==='wwr'||src.id==='remoteio'||src.id==='jobspresso'||src.id==='buildremote'||src.id==='remotearch';
          jobs.push({
            title: item.title||'Untitled',
            link: item.link||'#',
            source: ['indeed2','indeed3','remotearch'].includes(src.id)?'indeed':src.id,
            sourceName: src.name,
            date: item.pubDate ? new Date(item.pubDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'Today',
            h1b: H1B_FIRMS.some(f=>tl.includes(f)),
            passive: text.includes('passive')||text.includes('phius')||text.includes('energy'),
            remote: isRemote,
            desc: (item.description||'').replace(/<[^>]+>/g,'').slice(0,130)
          });
        }
      });
    } catch(e){}
  }));
  if (!jobs.length) jobs = sampleJobs();
  renderJobs();
}

function renderJobs() {
  const list = document.getElementById('jobs-list');
  const f = jobs.filter(j => {
    if(jobFilter==='all') return true;
    if(jobFilter==='h1b') return j.h1b;
    if(jobFilter==='passive') return j.passive;
    if(jobFilter==='remote') return j.remote;
    if(jobFilter==='usonsite') return !j.remote;
    return j.source===jobFilter;
  });
  if (!f.length) { list.innerHTML='<div class="empty">No openings match this filter.</div>'; return; }
  list.innerHTML = f.map(j => `
    <div class="card">
      <div class="card-row">
        <div class="card-body">
          <div class="card-title">${j.title}</div>
          <div class="card-meta">${j.sourceName} · ${j.date}</div>
          <div class="tags">
            ${j.h1b?'<span class="tag tag-h1b">H1B-capable</span>':''}
            ${j.passive?'<span class="tag tag-passive">Passive house</span>':''}
            ${j.remote?'<span class="tag tag-remote">Remote</span>':'<span class="tag tag-onsite">US onsite</span>'}
            <span class="tag tag-src">${j.sourceName}</span>
          </div>
          <div class="card-desc">${j.desc}</div>
        </div>
        <div class="card-actions">
          <a href="${j.link}" target="_blank"><button class="btn btn-sm">View ↗</button></a>
          <button class="btn btn-sm btn-primary" onclick='quickLog(${JSON.stringify(j.title)},${JSON.stringify(j.link)})'>Log app</button>
        </div>
      </div>
    </div>`).join('');
}

function filterJobs(f,el) {

}

async function loadApps() {
  document.getElementById('apps-list').innerHTML='<div class="loading">Loading from Google Sheets</div>';
  try {
    const d = await sheetGet('getApps');
    apps = d.rows||[];
    renderApps('');

    setSyncStatus('app-sync','err','⚠ Sheet offline');

}

function renderApps(search) {
  document.getElementById('s-total').textContent = apps.length;
  document.getElementById('s-active').textContent = apps.filter(a=>a.status==='pending'||a.status==='heard').length;
  document.getElementById('s-interview').textContent = apps.filter(a=>a.status==='interviewing').length;
  const list = document.getElementById('apps-list');
  let f = [...apps].reverse().filter(a=>!search||(a.firm+a.role+(a.loc||'')).toLowerCase().includes(search.toLowerCase()));
  if (!f.length) { list.innerHTML='<div class="empty">No applications yet.<br>Hit "+ Add" or use "Log app" from the digest.</div>'; return; }
  list.innerHTML = f.map((a,i)=>{
    const ri = apps.length-1-i;
    const cls={pending:'tag-applied',heard:'tag-heard',interviewing:'tag-interviewing',rejected:'tag-rejected'}[a.status]||'tag-applied';
    const lbl={pending:'Applied',heard:'Heard back',interviewing:'Interviewing',rejected:'Rejected'}[a.status]||'Applied';
    return `<div class="card">
      <div class="card-row">
        <div class="card-body">
          <div class="card-title">${a.firm||'—'}</div>
          <div class="card-meta">${a.role||'—'}${a.loc?' · '+a.loc:''}${a.date?' · '+a.date:''}</div>
          <div class="tags" style="margin-top:7px;">
            <span class="tag ${cls}">${lbl}</span>
            ${a.h1b==='yes'?'<span class="tag tag-h1b">H1B</span>':''}
            ${a.link?`<a href="${a.link}" target="_blank"><span class="tag tag-src">Job link ↗</span></a>`:''}
          </div>
          ${a.notes?`<div class="card-desc">${a.notes}</div>`:''}
        </div>
        <div class="card-actions">
          <button class="btn btn-sm" onclick="editApp(${ri})">Edit</button>
          <button class="btn btn-sm btn-ghost" onclick="deleteApp(${ri})">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openAppModal() {
  editAppId=null;
  document.getElementById('app-modal-title').textContent='Log application';
  document.getElementById('app-save-btn').textContent='Save to Sheet';
  ['app-firm','app-role','app-loc','app-link','app-notes'].forEach(f=>document.getElementById(f).value='');
  document.getElementById('app-date').value=new Date().toISOString().split('T')[0];

function editApp(idx) {

async function saveApp() {
  const btn=document.getElementById('app-save-btn');
  const a={firm:document.getElementById('app-firm').value,role:document.getElementById('app-role').value,date:document.getElementById('app-date').value,status:document.getElementById('app-status').value,loc:document.getElementById('app-loc').value,h1b:document.getElementById('app-h1b').value,link:document.getElementById('app-link').value,notes:document.getElementById('app-notes').value};
  if(!a.firm&&!a.role){alert('Please enter firm name or role.');return;}
  btn.textContent='Saving...';btn.disabled=true;
  try {
    if(editAppId!==null){a._id=editAppId;await sheetPost('saveApp',a);apps[editAppId]=a;}
    else{await sheetPost('saveApp',a);apps.push(a);}
    closeModal('app-modal');renderApps('');
  } catch(e){alert('Could not save to sheet.');}
  btn.textContent='Save to Sheet';btn.disabled=false;
}

async function deleteApp(idx) {
  if(!confirm('Delete this application?'))return;
  try{await sheetPost('deleteApp',null,idx);apps.splice(idx,1);renderApps('');}
  catch(e){alert('Could not delete.');}
}

}

function renderOutreach() {

      <div class="card-row">
        <div class="card-body">

async function runDistillFilter() {
  const emailText = document.getElementById('distill-paste').value.trim();
  if (!emailText) { alert('Please paste your Distill email first.'); return; }
  const btn = document.getElementById('distill-btn');
  const results = document.getElementById('distill-results');
  btn.textContent = 'Analysing...'; btn.disabled = true;
  results.innerHTML = '<div class="loading">AI is reading your email</div>';

  const prompt = `You are helping an architecture job seeker named Hasini Kadaru. Her profile:
- Entry level Architectural Designer
- Certified Passive House Consultant (CPHC, Phius)
- Skills: Revit, AutoCAD, SketchUp, Enscape, PHPP energy modeling
- Needs H1B visa sponsorship
- Interests: passive house, sustainability, enclosures, residential, adaptive reuse
- Graduating May 2026, open to relocation anywhere in the US

Below is a Distill.io alert email about changes detected on a firm's careers page. Extract any job postings that could be relevant to Hasini. For each relevant job found, return a JSON array with objects containing: title, firm, location, h1b (yes/unknown/no), passive (true/false), relevant (true/false), reason (1 sentence why it fits or doesn't), link (if found, else "").

If no relevant jobs found, return: {"none": true, "message": "brief explanation"}

Return ONLY valid JSON, no markdown, no explanation outside the JSON.

EMAIL CONTENT:
${emailText}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(c=>c.text||'').join('').trim();
    let parsed;
    try { parsed = JSON.parse(text); } catch(e) {
      const match = text.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
      parsed = match ? JSON.parse(match[0]) : null;
    }

    if (!parsed) {
      results.innerHTML = '<div class="empty">Could not parse response. Try pasting more of the email.</div>';
    } else if (parsed.none) {
      results.innerHTML = `<div class="empty" style="background:var(--surface);border-radius:var(--radius);padding:1.5rem;">
        <div style="font-size:13px;color:var(--muted);">No relevant jobs found</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">${parsed.message||''}</div>
      </div>`;
    } else {
      const jobs = Array.isArray(parsed) ? parsed : [parsed];
      const relevant = jobs.filter(j=>j.relevant!==false);
      const irrelevant = jobs.filter(j=>j.relevant===false);
      results.innerHTML = `
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px;font-family:monospace;">${relevant.length} relevant · ${irrelevant.length} filtered out</div>
        ${relevant.map(j=>`
          <div class="card">
            <div class="card-row">
              <div class="card-body">
                <div class="card-title">${j.title||'Untitled'}</div>
                <div class="card-meta">${j.firm||''}${j.location?' · '+j.location:''}</div>
                <div class="tags" style="margin-top:7px;">
                  ${j.h1b==='yes'?'<span class="tag tag-h1b">H1B-capable</span>':''}
                  ${j.passive?'<span class="tag tag-passive">Passive house</span>':''}
                </div>
                <div class="card-desc" style="margin-top:6px;">${j.reason||''}</div>
              </div>
              <div class="card-actions">
                ${j.link?`<a href="${j.link}" target="_blank"><button class="btn btn-sm">View ↗</button></a>`:''}
                <button class="btn btn-sm btn-primary" onclick='quickLogDistill(${JSON.stringify(j)})'>Log app</button>
              </div>
            </div>
          </div>`).join('')}
        ${irrelevant.length?`<details style="margin-top:1rem;"><summary style="font-size:12px;color:var(--muted);cursor:pointer;">${irrelevant.length} filtered out — not relevant</summary>
          <div style="margin-top:8px;">${irrelevant.map(j=>`<div class="card" style="opacity:0.5;"><div class="card-title" style="font-size:13px;">${j.title||'Untitled'}</div><div class="card-desc">${j.reason||''}</div></div>`).join('')}</div>
        </details>`:''}`;
    }
  } catch(e) {
    results.innerHTML = '<div class="empty">Error connecting to AI. Check your internet connection.</div>';
  }
  btn.textContent = 'Analyse with AI'; btn.disabled = false;
}

function quickLogDistill(job) {
  openAppModal();
  document.getElementById('app-firm').value = job.firm||'';
  document.getElementById('app-role').value = job.title||'';
  document.getElementById('app-loc').value = job.location||'';
  document.getElementById('app-h1b').value = job.h1b||'unknown';
  document.getElementById('app-link').value = job.link||'';
  document.getElementById('app-notes').value = job.reason||'';
}
